meta:
  id: "feat-20260331-002"
  title: "Changelog UI: ChangelogView, ProjectLayout, Project Page"
  category: "feature"
  status: "completed"
  priority: "high"
  created_at: "2026-03-31T15:30:00Z"
  updated_at: "2026-03-31T15:30:00Z"
  ticket_id: ""
  tags:
    - changelog
    - ui
    - react
    - project-page

  description:
    summary: >
      Three new frontend components implement the changelog viewer UI:
      ChangelogView (filterable feature list with expandable entry timelines),
      ProjectLayout (sidebar shell with view switching), and the rewritten
      project page server component that loads ChangelogFeatures from the DB
      and passes them to the new layout.
    business_context: >
      The project page previously rendered a PlanningLayout referencing deleted
      planning models (Epic/Feature/Task). After the Prisma schema migration to
      ChangelogFeature/Entry/CodeChange, the entire project view needed to be
      rebuilt around the new data model. This makes the changelog data
      collected from agent activity visible and navigable in the UI.
    affected_components:
      - "components/changelog/ChangelogView.tsx"
      - "components/changelog/ProjectLayout.tsx"
      - "app/(app)/projects/[id]/page.tsx"
    affected_users: "All users viewing project pages"
    acceptance_criteria:
      - "ChangelogView renders features with type/status/priority badges"
      - "Features expand on click to show entry timeline"
      - "Each entry is further expandable to show what/why/technical details/side effects"
      - "Filter sidebar allows filtering by type and status"
      - "Sync button triggers /api/projects/:id/changelog/sync and refreshes list"
      - "ProjectLayout sidebar allows switching between Changelog and Commits views"
      - "Settings link navigates to /projects/:id/settings"
      - "Project page server component loads DB data and maps to UI types without errors"
      - "TypeScript reports zero errors in the three new/modified files"

entries:
  - id: "entry-20260331-153000-fe01"
    timestamp: "2026-03-31T15:30:00Z"
    agent_type: "FrontEnd"
    agent_name: "Claude"
    action: "created"
    summary: "Created ChangelogView.tsx — filterable feature list with expandable entry timelines"
    description:
      what: >
        New client component at components/changelog/ChangelogView.tsx.
        Renders a two-panel layout: a left filter sidebar (type + status) and a
        scrollable main area listing ChangelogFeatures as collapsible rows.
        Each FeatureRow fetches full entry data on first expand via
        GET /api/projects/:id/changelog/:featureId. Each EntryRow is further
        expandable to show what/why/technical details/side effects and a
        changed-files table. A Sync button calls POST
        /api/projects/:id/changelog/sync then refreshes the feature list.
      why: >
        Changelog data stored by agents in .agent-changelog/ files (and synced
        to the DB) needed a human-readable viewer. The expandable timeline
        design lets users quickly scan headlines and drill into details on
        demand, avoiding information overload.
      technical_details: >
        Pure React with useState — no external state manager needed.
        TYPE_CONFIG, STATUS_CONFIG, PRIORITY_CONFIG and AGENT_COLOR lookup
        tables map enum values to Tailwind classes. FeatureRow lazy-fetches
        full entry data only on first expand, caching the result in local state
        to avoid repeat network calls. EntryRow uses the same lazy-expand
        pattern for detail sections. All timestamps formatted via
        toLocaleDateString('de-DE'). Fully typed via UIChangelogFeature /
        UIChangelogEntry / UICodeChange from @/types/changelog.
      side_effects: >
        New directory components/changelog/ created.
        No new npm dependencies. Calls two existing API routes
        (/changelog and /changelog/sync) that must be implemented by BackEnd.
    code_changes:
      - file: "components/changelog/ChangelogView.tsx"
        change_type: "added"
        lines_added: 282
        lines_removed: 0
        diff_summary: "New client component: filter sidebar, FeatureRow, EntryRow, ChangelogView"
    dependencies: []
    related_entries: []

  - id: "entry-20260331-153001-fe02"
    timestamp: "2026-03-31T15:30:01Z"
    agent_type: "FrontEnd"
    agent_name: "Claude"
    action: "created"
    summary: "Created ProjectLayout.tsx — sidebar shell with changelog/commits view switching"
    description:
      what: >
        New client component at components/changelog/ProjectLayout.tsx.
        Renders a two-panel shell: a left sidebar showing project name/repo,
        view-toggle buttons (Changelog / Commits), and a Settings link at the
        bottom; the main area conditionally renders ChangelogView or CommitsView
        based on selected view.
      why: >
        The project page needs a persistent sidebar for navigation context
        (project identity, view switching) that wraps the interchangeable
        content panels. Splitting this from ChangelogView keeps each component
        focused on a single responsibility.
      technical_details: >
        Uses CommitsView from @/components/planning/CommitsView (pre-existing
        component). Settings link uses Next.js Link to /projects/:id/settings.
        View type is a union "changelog" | "commits" kept in local useState.
        Settings icon is an inline SVG (no icon library dependency).
      side_effects: >
        Imports CommitsView from the existing planning directory — if that
        component is moved or deleted this import will break.
    code_changes:
      - file: "components/changelog/ProjectLayout.tsx"
        change_type: "added"
        lines_added: 88
        lines_removed: 0
        diff_summary: "New client shell component with sidebar + view switching"
    dependencies: []
    related_entries:
      - "entry-20260331-153000-fe01"

  - id: "entry-20260331-153002-fe03"
    timestamp: "2026-03-31T15:30:02Z"
    agent_type: "FrontEnd"
    agent_name: "Claude"
    action: "modified"
    summary: "Rewrote app/(app)/projects/[id]/page.tsx to load ChangelogFeatures and render ProjectLayout"
    description:
      what: >
        Replaced the entire previous server component (which loaded
        Epic/Feature/Task planning data and rendered PlanningLayout) with a new
        implementation that queries ChangelogFeature with nested entries and
        codeChanges from the DB, maps them to UIChangelogFeature[], and renders
        ProjectLayout. The old PlanningLayout / planning types are no longer
        imported here.
      why: >
        The Prisma schema migration deleted the Epic/Feature/Task models,
        making the previous page.tsx broken at runtime. The page needed to be
        aligned with the new ChangelogFeature data model.
      technical_details: >
        Uses db.changelogFeature.findMany with _count.entries (for the entry
        badge without loading all entries) AND full entries+codeChanges include
        so the initial render has complete data. All Date fields are serialized
        to ISO strings via .toISOString() before passing to the client
        component. Prisma enum values are cast directly to the matching
        TypeScript union types since the schemas are kept in sync.
        notFound() is called if no project is found for the given id param.
      side_effects: >
        PlanningLayout is no longer rendered from this route. The old
        serialization helpers (serializeTask, serializeFeature, serializeProject,
        parseStringArray) and the Prisma validator const are removed entirely —
        106 lines deleted.
    code_changes:
      - file: "app/(app)/projects/[id]/page.tsx"
        change_type: "modified"
        lines_added: 89
        lines_removed: 106
        diff_summary: "Replaced PlanningLayout + Epic/Feature/Task queries with ChangelogFeature query + ProjectLayout render"
    dependencies: []
    related_entries:
      - "entry-20260331-153000-fe01"
      - "entry-20260331-153001-fe02"
