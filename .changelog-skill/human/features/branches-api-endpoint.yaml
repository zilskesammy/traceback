  description:
    summary: >
      Created GET /api/projects/[id]/branches route to enable fetching
      available GitHub branches for a project. This endpoint integrates
      with the recently added listBranches() function from lib/github-api.ts.
    
    business_context: >
      The frontend needs to display available GitHub branches in the changelog UI,
      allowing users to select or filter by branch when viewing project history.
      This endpoint provides the backend integration point.
    
    affected_components:
      - "app/api/projects/[id]/branches/route.ts"
      - "lib/github-api.ts (existing listBranches function)"
      - "lib/api/auth-middleware.ts (existing resolveAuth)"
    
    affected_users: "All users viewing changelog with branch context awareness"
    
    acceptance_criteria:
      - "Endpoint returns 401 Unauthorized when user lacks access"
      - "Endpoint returns 404 when project not found"
      - "Endpoint returns 200 with branches array when successful"
      - "Response format: { branches: [...] }"

