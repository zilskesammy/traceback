  description:
    summary: >
      Added optional changelogBranch String? field to the Prisma Project model,
      enabling changelog sync to read from a configurable branch instead of
      always using defaultBranch.
    business_context: >
      Multi-branch changelog synchronization requires projects to optionally
      specify a separate branch for changelog tracking. This field allows
      fine-grained control over which branch contains authoritative changelog
      entries, improving flexibility for teams with complex branching strategies.
    affected_components:
      - "prisma/schema.prisma"
      - "@prisma/client (generated types)"
    affected_users: "All projects using changelog sync feature"
