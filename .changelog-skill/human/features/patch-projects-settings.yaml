  description:
    summary: >
      Created a PATCH endpoint at /api/projects/[id] to allow authenticated users
      to update project settings, specifically the changelogBranch field.
      This enables configuration of which Git branch the changelog should track.
    business_context: >
      Projects need to be able to specify which branch their changelog should sync from.
      Previously, there was no way to update project settings via the API.
      This endpoint closes that gap.
    affected_components:
      - "app/api/projects/[id]/route.ts"
      - "lib/api/auth-middleware.ts"
