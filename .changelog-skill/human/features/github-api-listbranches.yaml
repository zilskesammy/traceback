    summary: "Implemented listBranches() function in github-api.ts"
    description:
      what: >
        Added new async function listBranches(owner: string, repo: string)
        to lib/github-api.ts that fetches all branches from a GitHub
        repository and returns them as a sorted array of branch names.
      why: >
        Backend API route in Task 3 needs to list all branches in a
        repository. Centralizing this in github-api.ts maintains consistency
        with existing helper functions (getFileContent, createBranch, etc.).
      technical_details: >
        Function uses the singleton octokit instance already initialized at
        the top of github-api.ts. Calls octokit.repos.listBranches with
        owner, repo, and per_page=100 (GitHub API maximum). Maps the response
        data to extract branch names and sorts them alphabetically using
        JavaScript Array.sort(). Return type is Promise<string[]>.
      side_effects: >
        No breaking changes. Pure addition of a new export. Follows existing
        code patterns in the file: async/await error handling, TypeScript
        type annotations, JSDoc comments describing function purpose.
