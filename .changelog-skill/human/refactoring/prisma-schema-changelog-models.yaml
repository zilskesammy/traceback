    summary: "Prisma Schema vollstĂ¤ndig auf Changelog-Datenmodell umgebaut"
    description:
      what: >
        prisma/schema.prisma komplett neu geschrieben:
        (1) Modelle Epic, Feature, Task, TaskComment entfernt.
        (2) Enums TicketStatus und DelegateStatus entfernt.
        (3) SessionStep von ticketId/Task auf featureId/ChangelogFeature umverdrahtet,
            Index von [ticketId, sequence] auf [featureId, sequence] geĂ¤ndert.
        (4) LinkedPR von ticketId/Task auf featureId/ChangelogFeature umverdrahtet.
        (5) Agent.delegatedTasks Task[] Relation entfernt.
        (6) 7 neue Enums hinzugefĂĽgt: ChangelogItemType, ChangelogStatus,
            ChangelogPriority, ChangelogSource, ChangelogAgentType,
            ChangelogAction, CodeChangeType.
        (7) 3 neue Modelle hinzugefĂĽgt: ChangelogFeature (self-referential
            Hierarchie via "FeatureHierarchy"), ChangelogEntry, CodeChange.
        (8) Project.changelogFeatures Relation hinzugefĂĽgt, Project.epics entfernt.
        (9) Schema validiert (prisma validate), DB gepusht (prisma db push
            --accept-data-loss), Client regeneriert (prisma generate).
      why: >
        Das neue Schema bildet Agent-AktivitĂ¤ten direkt ab: Ein ChangelogFeature
        entspricht einem Arbeitspaket (EPIC/FEATURE/BUGFIX/TASK), ChangelogEntry
        ist ein einzelner Agent-Log-Eintrag mit Kontext (what/why/technicalDetails),
        CodeChange beschreibt einzelne Datei-Ă„nderungen. SessionStep und LinkedPR
        gehĂ¶ren jetzt zu ChangelogFeature statt zu Task â€” das passt zur neuen
        semantischen Rolle dieser Modelle im Agent-Workflow.
      technical_details: >
        ChangelogFeature nutzt eine self-referential Relation "FeatureHierarchy"
        (parent/children) fĂĽr beliebig tiefe Hierarchien. Indizes auf projectId,
        parentId, type und status fĂĽr typische Query-Patterns.
        ChangelogEntry hat Indizes auf featureId, timestamp und agentType.
        CodeChange ist append-only mit Index auf entryId und file.
        Alle String-IDs sind cuid() oder manuell gesetzt (kein auto-increment)
        um externe IDs (z.B. aus Changelog-Dateien) direkt zu verwenden.
        DB push mit --accept-data-loss war nĂ¶tig da 4 Epics, 9 Features,
        9 Tasks unwiederbringlich gelĂ¶scht wurden â€” bewusste Entscheidung,
        Daten kommen spĂ¤ter aus Changelog-Sync.
      side_effects: >
        Alle TypeScript-Dateien die PrismaClient mit Epic/Feature/Task-Typen
        nutzen werden build-time-Fehler haben. Betroffen sind wahrscheinlich:
        API-Routes, Services und tRPC-Router fĂĽr das alte Ticket-System.
        Prisma Client wurde neu generiert â€” node_modules/@prisma/client
        enthĂ¤lt keine Epic/Task/Feature-Typen mehr.
    code_changes:
