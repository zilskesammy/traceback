        change_type: "modified"
        lines_added: 166
        lines_removed: 133
        diff_summary: >
          Entfernt: Epic, Feature, Task, TaskComment, TicketStatus, DelegateStatus.
          GeĂ¤ndert: SessionStep (ticketIdâ†’featureId, Taskâ†’ChangelogFeature),
          LinkedPR (ticketIdâ†’featureId, Taskâ†’ChangelogFeature),
          Agent (delegatedTasks entfernt),
          Project (epics entfernt, changelogFeatures hinzugefĂĽgt).
          HinzugefĂĽgt: ChangelogFeature, ChangelogEntry, CodeChange und
          7 neue Enums (ChangelogItemType, ChangelogStatus, ChangelogPriority,
