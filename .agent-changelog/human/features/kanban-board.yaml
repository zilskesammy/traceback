  - id: "entry-20260327-084902-fe01"
    timestamp: "2026-03-27T08:49:02Z"
    agent_type: "FrontEnd"
    agent_name: "Claude"
    action: "modified"
    summary: "Drag & Drop zu KanbanBoard hinzugefügt, Settings-Link-Position korrigiert"
    description:
      what: >
        HTML5-natives Drag & Drop: Karte auf andere Spalte ziehen ruft PATCH auf
        und hebt Drop-Ziel-Spalte hervor. Fix: Settings-Link war außerhalb des
        <aside>-Elements, jetzt korrekt als Flex-Child. aside overflow-hidden damit
        Epic-Liste unabhängig scrollt.
      why: >
        Drag & Drop macht Status-Änderungen intuitiver als Dropdown. Der Settings-Link
        war durch den falschen DOM-Platz visuell falsch positioniert.
      technical_details: >
        onDragStart/onDragOver/onDrop Handler. Drop-Target-Hervorhebung via
        isDragOver State. PATCH /api/features/[id] mit {status: newStatus}.
      side_effects: >
        KanbanBoard.tsx erheblich umgebaut (233 Zeilen Diff statt +320 vom Erstellen).
    code_changes:
      - file: "components/planning/KanbanBoard.tsx"
        change_type: "modified"
        lines_added: 159
        lines_removed: 80
        diff_summary: "Drag & Drop Handler und Drop-Target-Highlighting"
      - file: "components/planning/PlanningLayout.tsx"
        change_type: "modified"
        lines_added: 4
        lines_removed: 2
        diff_summary: "Settings-Link in aside verschoben, overflow-hidden"
    dependencies: []
    related_entries:
      - "entry-20260327-083600-fe01"
