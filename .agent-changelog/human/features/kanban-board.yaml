    summary: "KanbanBoard-Komponente mit View-Toggle und Settings-Link erstellt"
    description:
      what: >
        KanbanBoard.tsx: Features in Status-Spalten (Backlog, In Progress, In Review,
        Done, Cancelled). Kompakte Cards mit Task-Progress-Bar, Assignee-Badge,
        Commit-Ref. ViewToggle um "Kanban" erweitert. Settings-Link (Zahnrad)
        unten in der Epic-Sidebar. FeatureModal um preselectedStatus-Prop erweitert.
      why: >
        Kanban ist eine vertraute Darstellung für Entwicklungsteams.
        Der Settings-Link fehlte bisher in der Hauptnavigation.
      technical_details: >
        Reine React-Komponente ohne externe Kanban-Bibliothek. Spalten
        dynamisch aus STATUS_CONFIG generiert. preselectedStatus in FeatureModal
        für "+" Buttons in Kanban-Spalten.
      side_effects: >
        PlanningLayout erheblich erweitert (39 Zeilen Diff). Neuer Pfad
        /projects/[id]/settings als Navigation-Ziel.
    code_changes:
