  - id: "entry-20260327-131445-fe01"
    timestamp: "2026-03-27T13:14:45Z"
    agent_type: "FrontEnd"
    agent_name: "Claude"
    action: "modified"
    summary: "TB-Nummern-Convention und automatische Webhook-Registrierung ergänzt"
    description:
      what: >
        Task.number: neues Int-Feld für TB-{n} Convention (auto-assign bei Erstellung
        via API-Route). Webhook-Handler: Commit-Messages und PR-Titel nach TB-{n}
        Pattern parsen → Status-Updates. createGitHubWebhook() als Funktion in
        lib/github-api.ts extrahiert. Projekt-Erstellungsseite ruft Webhook-Setup
        automatisch auf.
      why: >
        TB-Nummern machen die Verlinkung von Commits/PRs zu Tasks explizit und
        konventionsbasiert — wie JIRA-Nummern (PROJ-123). Automatisches Webhook-Setup
        senkt die Onboarding-Hürde: Nutzer müssen nichts manuell in GitHub konfigurieren.
      technical_details: >
        7 geänderte Dateien, +154 Zeilen. Task.number auto-increment via Prisma
        (zählt Tasks pro Projekt). Regex \bTB-(\d+)\b in Webhook-Handler.
      side_effects: >
        Prisma-Migration erforderlich (Task.number Feld).
        Projekterstellungsseite ruft jetzt GitHub-API auf → GITHUB_TOKEN Pflicht.
    code_changes:
      - file: "prisma/schema.prisma"
        change_type: "modified"
        lines_added: 1
        lines_removed: 0
        diff_summary: "Task.number Int? hinzugefügt"
      - file: "app/api/webhook/github/route.ts"
        change_type: "modified"
        lines_added: 80
        lines_removed: 1
        diff_summary: "TB-{n} Pattern-Matching in Commits und PR-Titeln"
      - file: "lib/github-api.ts"
        change_type: "modified"
        lines_added: 38
        lines_removed: 0
        diff_summary: "createGitHubWebhook() extrahiert"
      - file: "app/(app)/projects/new/page.tsx"
        change_type: "modified"
        lines_added: 25
        lines_removed: 1
        diff_summary: "Automatisches Webhook-Setup bei Projekt-Erstellung"
    dependencies: []
    related_entries:
