        Catch-All-Route [[...slug]] für flexible URL-Struktur.
      side_effects: >
        Package.json um 4 neue Dependencies erweitert: next-mdx-remote,
        gray-matter, fuse.js, shiki. Package-lock deutlich gewachsen (+2836 Zeilen).
