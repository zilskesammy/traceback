  description:
    summary: >
      Vollständige CRUD-Funktionalität für Epics, Features und Tasks:
      UI-Modals mit Formularen sowie alle REST-API-Routen (GET/POST/PATCH/DELETE).
    business_context: >
      Ohne CRUD-Funktionalität war die Planungsansicht read-only. Nutzer
      konnten keine Tickets anlegen, bearbeiten oder löschen — nur importierte
      Daten betrachten.
    affected_components:
      - "app/api/projects/[id]/epics/"
      - "app/api/tasks/"
      - "components/planning/modals/"
      - "components/planning/PlanningLayout.tsx"
      - "components/planning/FeatureCard.tsx"
      - "lib/api/"
    affected_users: "Alle Nutzer der Planungsansicht"
    acceptance_criteria:
