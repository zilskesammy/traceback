  tags:
    - ux
    - tasks
    - inline-edit

  description:
    summary: >
      Status-Punkt auf jeder Task-Zeile ist anklickbar. Öffnet ein Dropdown
      mit allen Status-Optionen (BACKLOG → DONE). Ändert den Status sofort
      via PATCH ohne das Modal öffnen zu müssen.
    business_context: >
      Status-Änderungen waren bisher nur über das Task-Modal möglich — zu viele
      Klicks für eine häufige Aktion. Inline-Änderung beschleunigt den Daily-Workflow.
    affected_components:
      - "components/planning/FeatureCard.tsx"
    affected_users: "Alle Nutzer der Planungsansicht"
    acceptance_criteria:
      - "Klick auf Status-Punkt öffnet Dropdown"
      - "Alle Status-Optionen im Dropdown"
      - "PATCH-Request bei Auswahl, UI sofort aktualisiert"

