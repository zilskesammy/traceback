        direkt durchgelassen ohne Session-Validierung. Route-Handler übernehmen
        die Key-Prüfung.
      why: >
        Das API-Key-System (feat-20260327-002) war funktionslos solange die
        Middleware alle nicht-authentifizierten Requests blockierte.
      technical_details: >
        Früherkennung des x-api-key Headers im Proxy-Middleware-Stack.
        Defense-in-depth bleibt erhalten: Route-Handler validieren den Key.
      side_effects: >
        Keine. Nur proxy.ts geändert, Session-Auth für normale Nutzer unberührt.
    code_changes:
