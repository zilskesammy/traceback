meta:
  id: "fix-20260327-001"
  title: "x-api-key Requests durch Middleware blockiert"
  category: "bugfix"
  status: "completed"
  priority: "high"
  created_at: "2026-03-27T09:13:17Z"
  updated_at: "2026-03-27T09:13:17Z"
  ticket_id: ""
  tags:
    - middleware
    - auth
    - api-key
    - agents

  description:
    summary: >
      API-Agent-Requests mit x-api-key Header wurden von der Middleware
      blockiert bevor sie den Route-Handler erreichten.
    root_cause: >
      Die Middleware prüfte Session-Auth für alle Requests ohne Ausnahme für
      x-api-key Header. API-Agents, die keinen Session-Cookie mitschicken,
      wurden mit 401/302 abgewiesen bevor der Route-Handler die Key-Validierung
      durchführen konnte.
    impact: >
      Alle programmatischen API-Zugriffe via x-api-key waren nicht funktionsfähig.
      Das betraf das gesamte AI-Agent-Ökosystem (100% der Agent-Requests).
    resolution: >
      proxy.ts: Requests mit x-api-key Header bypassen die Session-Prüfung
      in der Middleware. Die Route-Handler validieren den Key selbst.
    regression_risk: >
      Gering. Die Änderung ist auf proxy.ts beschränkt und betrifft nur den
      Bypass-Pfad. Session-Auth für normale Nutzer ist unverändert.
    affected_components:
      - "proxy.ts"
    affected_users: "AI-Agenten und Tools die x-api-key für API-Zugriff nutzen"

